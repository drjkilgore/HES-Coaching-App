/* ---- contract math ---- */
async function contractStatus(coach){
  const cds=[];
  for(const sid of coach.schools){
    const sc=mem.schools.find(s=>s.id===sid); if(!sc)continue;
    const base=(CONTRACT_BASELINE[sid]||{worked:0}).worked;
    const logged=mem.time.filter(t=>t.coach===coach.id&&t.school===sid).reduce((a,t)=>a+(t.hours||0),0);
    const worked=base+logged;
    const pct=Math.min(100,Math.round(worked/sc.contract*100));
    const level = worked>sc.contract?"bad":pct>=85?"warn":"good";
    cds.push({sid,name:sc.short,full:sc.name,contract:sc.contract,worked,pct:Math.round(worked/sc.contract*100),bar:pct,level,remaining:sc.contract-worked});
  }
  return cds;
}

    <p class="muted" style="font-size:12px;margin:6px 0 14px">Every observation, goal, and resource builds this record automatically — the EOY report writes itself from here.</p>
    <ul class="tl" id="tl"></ul></div>`);
  const ul=tl.querySelector('#tl');
  const events=[];
  cg.goals.forEach((g,i)=>events.push({type:"goal",date:"2025-09-19",title:"Coaching goal set",body:g,i}));
  obs.forEach(o=>events.push({type:"obs",date:o.date,title:`Classroom observation`,body:o.evidence,ref:o}));
  cg.resources.slice(0,3).forEach(r=>events.push({type:"res",date:"2025-10-15",title:"Resource shared",body:r}));
  events.sort((a,b)=>b.date.localeCompare(a.date));
  if(!events.length) ul.appendChild(h(`<li class="res"><div class="t-title">No activity yet</div></li>`));
  events.forEach(e=>{
    const li=h(`<li class="${e.type}"><div class="t-date">${fmtDate(e.date)}</div>
      <div class="t-title">${esc(e.title)}</div><div class="muted" style="font-size:13px">${esc(e.body).slice(0,180)}${e.body&&e.body.length>180?"…":""}</div></li>`);
    if(e.ref){li.style.cursor="pointer";li.classList.add("clk");li.onclick=()=>openObsView(e.ref,t);}
    ul.appendChild(li);
  });
  two.appendChild(tl);

  // Coaching summary
  const sum=h(`<div class="col">
    <div class="card pad"><div class="eyebrow">Goals · coaching feedback cycles</div><ol class="list-inline">${cg.goals.map(g=>`<li>${esc(g)}</li>`).join("")}</ol></div>
    <div class="card pad"><div class="eyebrow">Resources shared</div><div style="margin-top:8px">${cg.resources.map(r=>`<span class="chip">${esc(r)}</span>`).join("")||'<span class="muted">None yet</span>'}</div></div>
    <div class="card pad"><div class="eyebrow">Demonstrated outcomes</div><ul class="list-inline">${(cg.outcomes||[]).map(o=>`<li>${esc(o)}</li>`).join("")||'<li class="muted">Building…</li>'}</ul></div>
  </div>`);
  two.appendChild(sum);
  v.appendChild(two);
}

function obsRow(label,val){
  const tag=val==="Yes"?`<span class="tag good">Yes</span>`:val==="No"?`<span class="tag bad">No</span>`:`<span class="tag">Not observed</span>`;
  return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line-2)"><span>${esc(label)}</span>${tag}</div>`;
}
function openObsView(o,t){
  const m=h(`<div class="scrim"><div class="modal"><div class="mhead"><b>Observation · ${esc(t.name)}</b>
    <span class="muted" style="font-size:12.5px">${fmtDate(o.date)} · ${esc(o.time||"")}</span><button class="x">✕</button></div>
    <div class="mbody">
      <div class="field"><label class="f">Lesson objective</label><div>${esc(o.objective)}</div></div>
      <div class="eyebrow" style="margin-top:6px">Lesson opening</div>
      ${obsRow("Restorative focus",o.opening.restorative)}${obsRow("Objective explained to students",o.opening.objective_explained)}${obsRow("Prior knowledge tied in",o.opening.prior_knowledge)}
      <div class="eyebrow" style="margin-top:14px">Mid-lesson</div>
      ${obsRow("Easy to follow",o.mid.easy_follow)}${obsRow("Deliverables attainable",o.mid.attainable)}${obsRow("Lesson engaging",o.mid.engaging)}${obsRow("Q&A opportunities",o.mid.qa)}
      <div class="eyebrow" style="margin-top:14px">Conclusion</div>
      ${obsRow("Discuss / collaborate / demonstrate",o.close.collaborate)}${obsRow("Clear next steps",o.close.next_steps)}${obsRow("Assessed learning",o.close.assessed)}
      <div class="field" style="margin-top:14px"><label class="f">Evidence</label><div class="dim">${esc(o.evidence)}</div></div>
      <div class="field"><label class="f">Recommendations</label><div class="dim">${esc(o.recs)}</div></div>
    </div></div></div>`);
  const close=()=>m.remove(); m.querySelector('.x').onclick=close; m.onclick=e=>{if(e.target===m)close();};
  document.body.appendChild(m);
}

const YN=["Yes","No","Not observed"];
function segField(id,label){
  return `<div class="field"><label class="f">${esc(label)}</label>
    <div class="yesno" data-seg="${id}">${YN.map((y,i)=>`<div class="seg ${i===0?'on':''}" data-v="${y}">${y}</div>`).join("")}</div></div>`;
}
async function vObserve(v){
  const coach=mem.coaches.find(c=>c.id===state.coach);
  const teachers=await db.teachers(coach.schools);
  const pre=state.param;
  const opts=teachers.map(t=>`<option value="${t.id}" ${t.id===pre?'selected':''}>${esc(t.name)} · ${esc(mem.schools.find(s=>s.id===t.school).short)}</option>`).join("");
  const form=h(`<div class="card pad">
    <div class="eyebrow">New classroom observation</div>
    <p class="muted" style="font-size:12.5px;margin:6px 0 16px">A digital walkthrough — replaces the Word checklist. On save it lands on the teacher's growth timeline and feeds the EOY report.</p>
    <div class="grid g3">
      <div class="field"><label class="f">Teacher</label><select id="te">${opts}</select></div>
      <div class="field"><label class="f">Date</label><input type="date" id="date" value="2026-02-05"></div>
      <div class="field"><label class="f">Time</label><input type="time" id="time" value="09:20"></div>
    </div>
    <div class="field"><label class="f">Lesson objective</label><input id="obj" placeholder="What were students working toward?"></div>
    <div class="hr"></div>
    <div class="eyebrow">Lesson opening</div>
    <div class="grid g3">${segField("o_rest","Restorative focus")}${segField("o_obj","Objective explained")}${segField("o_prior","Prior knowledge tied in")}</div>
    <div class="eyebrow" style="margin-top:6px">Mid-lesson</div>
    <div class="grid g4">${segField("m_easy","Easy to follow")}${segField("m_att","Deliverables attainable")}${segField("m_eng","Engaging")}${segField("m_qa","Q&A opportunities")}</div>
    <div class="eyebrow" style="margin-top:6px">Conclusion</div>
    <div class="grid g3">${segField("c_collab","Discuss/collaborate")}${segField("c_next","Clear next steps")}${segField("c_assess","Assessed learning")}</div>
    <div class="field" style="margin-top:6px"><label class="f">Evidence / notes</label><textarea id="ev" placeholder="What did you see?"></textarea></div>
    <div class="field"><label class="f">Recommendations</label><textarea id="recs" placeholder="Next-step coaching recommendations…"></textarea></div>
    <div style="display:flex;gap:10px"><button class="btn p" id="save">Save observation</button>
      <button class="btn" id="ai" title="Uses your AI endpoint if configured; otherwise a built-in template">✦ Draft recommendations</button></div>
    <div id="aiout"></div>
  </div>`);
  // segmented control behavior
  form.querySelectorAll('[data-seg]').forEach(seg=>{
    seg.querySelectorAll('.seg').forEach(b=>b.onclick=()=>{seg.querySelectorAll('.seg').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
  });
  const getSeg=id=>form.querySelector(`[data-seg="${id}"] .seg.on`).dataset.v;
  form.querySelector('#ai').onclick=async(e)=>{
    e.target.disabled=true;e.target.textContent="Drafting…";
    const t=mem.teachers.find(x=>x.id===form.querySelector('#te').value);
    const flags=[["closure",getSeg("c_next")],["assessment",getSeg("c_assess")],["objective",getSeg("o_obj")]];
    const txt=await aiDraft({teacher:t,objective:form.querySelector('#obj').value,evidence:form.querySelector('#ev').value,flags});
    form.querySelector('#recs').value=txt;
    e.target.disabled=false;e.target.textContent="✦ Draft recommendations";
  };
  form.querySelector('#save').onclick=async()=>{
    const o={teacher:form.querySelector('#te').value,coach:coach.id,date:form.querySelector('#date').value,time:form.querySelector('#time').value,
      subject:"",grade:"",objective:form.querySelector('#obj').value,
      opening:{restorative:getSeg("o_rest"),objective_explained:getSeg("o_obj"),prior_knowledge:getSeg("o_prior")},
      mid:{easy_follow:getSeg("m_easy"),attainable:getSeg("m_att"),engaging:getSeg("m_eng"),qa:getSeg("m_qa")},
      close:{collaborate:getSeg("c_collab"),next_steps:getSeg("c_next"),assessed:getSeg("c_assess")},
      evidence:form.querySelector('#ev').value,recs:form.querySelector('#recs').value};
    await db.addObservation(o); go('teacher',o.teacher);
  };
  v.appendChild(form);
}

/* AI draft — calls your Netlify proxy if set, else a deterministic template */
async function aiDraft({teacher,objective,evidence,flags}){
  const ep=window.HCP_CONFIG.AI_ENDPOINT;
  if(ep){
    try{
      const r=await fetch(ep,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({task:"observation_recs",teacher:teacher.name,objective,evidence,flags})});
      if(r.ok){const j=await r.json(); if(j.text) return j.text;}
    }catch(e){/* fall through to template */}
  }
  const gaps=flags.filter(([k,v])=>v!=="Yes").map(([k])=>k);
  const lines=[];
  if(gaps.includes("closure")) lines.push("Strengthen lesson closure: revisit the posted objective and summarize key concepts before dismissal, asking students to name what they learned.");
  if(gaps.includes("assessment")) lines.push("Build in a quick whole-class check for understanding (show-me boards, thumbs, or exit ticket) to surface misconceptions in real time.");
  if(gaps.includes("objective")) lines.push("Post the objective in student-friendly language and have a student read it aloud so learners connect activities to the target.");
  lines.push(`Continue reinforcing alignment between the objective${objective?` ("${objective.slice(0,60)}")`:""}, guided practice, and independent work.`);
  return lines.map(l=>"• "+l).join("\n");
}

    <div style="display:flex;gap:10px">
      <button class="btn" id="print">⎙ Print / PDF</button>

  const rep=h(`<div class="card pad" id="report" style="max-width:820px;margin:0 auto"></div>`);

  R.appendChild(h(`<p class="serif" style="font-size:15px;line-height:1.7;margin-top:16px">
    The 2025–2026 coaching support provided through EdConsult and KEM Consultants led to positive outcomes for teachers and students.
    ${esc(coach.name)} served as Instructional Coach${coach.years?` and, as a retired veteran teacher with ${coach.years} years of experience,`:""}
    provided coaching support to ${teachers.length} teachers. This report documents the goals, resources, and outcomes for each teacher,

    const sec=h(`<div style="margin-top:22px;page-break-inside:avoid">

      <div class="muted" style="font-size:12px;margin-bottom:6px">${obs.length} observation${obs.length!==1?"s":""} on file</div>
      <p style="margin:8px 0 4px"><b>Goals — Instructional Coaching Feedback Cycles</b></p>
      <ul class="list-inline">${cg.goals.map(g=>`<li>${esc(g)}</li>`).join("")}</ul>
      <p style="margin:12px 0 4px"><b>Resources</b></p>
      <ul class="list-inline">${cg.resources.map(r=>`<li>${esc(r)}</li>`).join("")}</ul>
      <p style="margin:12px 0 4px"><b>Outcomes</b></p>
      <ul class="list-inline">${(cg.outcomes||[]).map(o=>`<li>${esc(o)}</li>`).join("")||"<li>In progress.</li>"}</ul>
      <p style="margin:12px 0 4px"><b>2026–2027 Areas of Focus</b></p>
      <ol class="list-inline">${(cg.next||[]).map(o=>`<li>${esc(o)}</li>`).join("")}</ol>
    </div>`);
    R.appendChild(sec);
  }
  v.appendChild(rep);

  bar.querySelector('#copy').onclick=()=>{
    const tmp=document.createElement('div'); tmp.innerText=R.innerText;
    navigator.clipboard.writeText(R.innerText).then(()=>{const b=bar.querySelector('#copy');b.textContent="✓ Copied";setTimeout(()=>b.textContent="⧉ Copy report",1500);});
  };
}

function mountControls(){
  const rs=document.getElementById('roleSel');
  rs.innerHTML=ROLES.map(r=>`<option ${r===state.role?'selected':''}>${r}</option>`).join("");
  rs.onchange=e=>{state.role=e.target.value; render();};
  const cs=document.getElementById('coachSel');
  cs.innerHTML=mem.coaches.filter(c=>c.id!=="metima").map(c=>`<option value="${c.id}" ${c.id===state.coach?'selected':''}>${esc(c.name)}</option>`).join("");
  cs.onchange=e=>{state.coach=e.target.value; render();};
}
(async function(){
  await initBackend();
  mountControls();
  const[r,p]=location.hash.replace(/^#/,"").split("/");
  if(r){state.route=r;state.param=p||null;}
  render();
})();
