function navFor(role){
  const out=[]; let pendingGrp=null;

    out.push(n);
  });
  return out;
}
function renderNav(){

/* ---- contract math ---- */
async function contractStatus(coach){
  const cds=[];
  for(const sid of coach.schools){
    const sc=mem.schools.find(s=>s.id===sid); if(!sc)continue;
    const base=LIVE?0:(CONTRACT_BASELINE[sid]||{worked:0}).worked;
    const logged=mem.time.filter(t=>t.coach===coach.id&&t.school===sid).reduce((a,t)=>a+(t.hours||0),0);
    const worked=base+logged;
    const pct=Math.min(100,Math.round(worked/sc.contract*100));
    const level = worked>sc.contract?"bad":pct>=85?"warn":"good";
    cds.push({sid,name:sc.short,full:sc.name,contract:sc.contract,worked,pct:Math.round(worked/sc.contract*100),bar:pct,level,remaining:sc.contract-worked});
  }
  return cds;
}

/* AI draft — calls your Netlify proxy if set, else a deterministic template */
async function aiDraft({teacher,objective,evidence,flags}){
  const ep=window.HCP_CONFIG.AI_ENDPOINT;
  if(ep){
    try{
      const r=await fetch(ep,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({task:"observation_recs",teacher:teacher.name,objective,evidence,flags})});
      if(r.ok){const j=await r.json(); if(j.text) return j.text;}
    }catch(e){/* fall through to template */}
  }
  const gaps=flags.filter(([k,v])=>v!=="Yes").map(([k])=>k);
  const lines=[];
  if(gaps.includes("closure")) lines.push("Strengthen lesson closure: revisit the posted objective and summarize key concepts before dismissal, asking students to name what they learned.");
  if(gaps.includes("assessment")) lines.push("Build in a quick whole-class check for understanding (show-me boards, thumbs, or exit ticket) to surface misconceptions in real time.");
  if(gaps.includes("objective")) lines.push("Post the objective in student-friendly language and have a student read it aloud so learners connect activities to the target.");
  lines.push(`Continue reinforcing alignment between the objective${objective?` ("${objective.slice(0,60)}")`:""}, guided practice, and independent work.`);
  return lines.map(l=>"• "+l).join("\n");
}

/* ---------- CSV importer ---------- */
const IMPORT_TYPES={
  teachers:{label:"Teachers",fields:["full_name","subject","grade","school"],required:["full_name"],
    template:"full_name,subject,grade,school\nJane Doe,Math,5,Universal Learning Academy\n"},
  time:{label:"Time entries",fields:["entry_date","start_time","end_time","school","activity","teacher","note"],required:["entry_date","school"],
    template:"entry_date,start_time,end_time,school,activity,teacher,note\n2026-02-11,08:00,16:00,Star George Academy,Observation,,Observed teachers\n"},
  coaching:{label:"Coaching goals",fields:["teacher","item_type","body"],required:["teacher","item_type","body"],
    template:"teacher,item_type,body\nJane Doe,goal,Post the objective and revisit it at closure.\n"},
};
async function vImport(v){
  const coach=mem.coaches.find(c=>c.id===state.coach)||mem.coaches[0];
  v.appendChild(h(`<div class="banner noprint" style="margin-bottom:14px"><span>⭳</span>
    <div><b>Bulk import.</b> Export a sheet to CSV (or paste rows), map the columns, preview, and commit. ${LIVE?"Rows are written to your database.":"In demo mode rows are added to this session only."}</div></div>`));
  const pick=h(`<div class="card pad" style="margin-bottom:14px">
    <div class="eyebrow">1 · What are you importing?</div>
    <div style="display:flex;gap:10px;margin-top:10px" id="types"></div>
    <div style="margin-top:12px"><a id="tmpl" class="btn sm">⬇ Download template CSV</a></div></div>`);
  let type="teachers";
  const paintTypes=()=>{const w=pick.querySelector('#types');w.innerHTML="";
    Object.entries(IMPORT_TYPES).forEach(([k,cfg])=>{const b=h(`<button class="btn ${k===type?'p':''}">${cfg.label}</button>`);
      b.onclick=()=>{type=k;paintTypes();};w.appendChild(b);});};
  paintTypes();
  pick.querySelector('#tmpl').onclick=()=>{const cfg=IMPORT_TYPES[type];
    const blob=new Blob([cfg.template],{type:"text/csv"});const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=`${type}_template.csv`;a.click();};
  v.appendChild(pick);

  const src=h(`<div class="card pad" style="margin-bottom:14px">
    <div class="eyebrow">2 · Add your data</div>
    <div style="display:flex;gap:10px;margin:10px 0"><label class="btn sm">📁 Upload CSV<input type="file" id="file" accept=".csv" style="display:none"></label>
      <span class="muted" style="align-self:center;font-size:12.5px">or paste below</span></div>
    <textarea id="paste" style="min-height:110px;font-family:ui-monospace,monospace;font-size:12.5px" placeholder="Paste CSV rows (including the header)…"></textarea>
    <button class="btn p" id="parse" style="margin-top:10px">Parse & preview</button></div>`);
  v.appendChild(src);
  const out=h(`<div id="out"></div>`); v.appendChild(out);

  const doParse=(text)=>{
    if(!window.Papa){ out.innerHTML=`<div class="card pad empty">CSV parser still loading — try again in a moment.</div>`; return; }
    const res=window.Papa.parse(text.trim(),{header:true,skipEmptyLines:true});
    const rows=res.data; const cols=res.meta.fields||[];
    if(!rows.length){ out.innerHTML=`<div class="card pad empty">No rows found. Include a header row.</div>`; return; }
    renderMapping(type,cols,rows);
  };
  src.querySelector('#parse').onclick=()=>doParse(src.querySelector('#paste').value||IMPORT_TYPES[type].template);
  src.querySelector('#file').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{src.querySelector('#paste').value=r.result;doParse(r.result);};r.readAsText(f);};

  function renderMapping(type,cols,rows){
    const cfg=IMPORT_TYPES[type];
    out.innerHTML="";
    const map={}; cfg.fields.forEach(f=>{ map[f]=cols.find(c=>c.toLowerCase().replace(/\s+/g,'_')===f)|| cols.find(c=>c.toLowerCase().includes(f.split('_')[0]))||""; });
    const card=h(`<div class="card pad"><div class="eyebrow">3 · Map columns</div>
      <div class="grid g2" style="margin-top:12px" id="maps"></div>
      <div class="hr"></div><div class="eyebrow">Preview (first 5 rows)</div>
      <div style="overflow:auto"><table id="prev"></table></div>
      <div id="msg" style="margin-top:10px"></div>
      <div style="display:flex;gap:10px;margin-top:12px"><button class="btn p" id="commit">Import ${rows.length} rows</button></div></div>`);
    const maps=card.querySelector('#maps');
    cfg.fields.forEach(f=>{
      const sel=h(`<div class="field"><label class="f">${f}${cfg.required.includes(f)?' *':''}</label>
        <select data-f="${f}"><option value="">— skip —</option>${cols.map(c=>`<option ${map[f]===c?'selected':''}>${esc(c)}</option>`).join("")}</select></div>`);
      sel.querySelector('select').onchange=e=>{map[f]=e.target.value;drawPrev();};
      maps.appendChild(sel);
    });
    function rowObj(r){const o={};cfg.fields.forEach(f=>o[f]=map[f]?r[map[f]]:"");return o;}
    function drawPrev(){const p=card.querySelector('#prev');
      p.innerHTML=`<thead><tr>${cfg.fields.map(f=>`<th>${f}</th>`).join("")}</tr></thead><tbody>${
        rows.slice(0,5).map(r=>{const o=rowObj(r);return `<tr>${cfg.fields.map(f=>`<td>${esc(o[f]||"")}</td>`).join("")}</tr>`;}).join("")}</tbody>`;}
    drawPrev();
    card.querySelector('#commit').onclick=async()=>{
      const msg=card.querySelector('#msg');
      const missing=cfg.required.filter(f=>!map[f]);
      if(missing.length){msg.innerHTML=`<span class="tag bad">Map required fields: ${missing.join(", ")}</span>`;return;}
      card.querySelector('#commit').disabled=true; let ok=0,skip=0;
      for(const r of rows){
        const o=rowObj(r); if(cfg.required.some(f=>!o[f])){skip++;continue;}
        try{ await commitRow(type,o); ok++; }catch(e){ skip++; }
      }
      msg.innerHTML=`<span class="tag good">Imported ${ok}</span> ${skip?`<span class="tag warn">skipped ${skip}</span>`:""}`;
      await syncCache();
    };
    out.appendChild(card);
  }
  async function commitRow(type,o){
    const schoolId=s=>{const m=mem.schools.find(x=>x.name.toLowerCase()===(s||"").toLowerCase()||x.short.toLowerCase()===(s||"").toLowerCase());return m?m.id:(mem.schools[0]||{}).id;};
    const teacherId=n=>{const m=mem.teachers.find(x=>x.name.toLowerCase()===(n||"").toLowerCase());return m?m.id:null;};
    if(type==="teachers") return db.addTeacher({school:schoolId(o.school),name:o.full_name,subject:o.subject,grade:o.grade});
    if(type==="time"){ const hrs=(o.start_time&&o.end_time)?hoursBetween(o.start_time,o.end_time):0;
      return db.addTime({coach:coach.id,date:o.entry_date,school:schoolId(o.school),start:o.start_time||null,end:o.end_time||null,hours:hrs,activity:o.activity||"Documentation",teacher:teacherId(o.teacher),note:o.note}); }
    if(type==="coaching"){ const tid=teacherId(o.teacher); if(!tid) throw new Error("no teacher");
      const t=({goal:"goal",resource:"resource",outcome:"outcome",focus:"focus_next_year",next:"focus_next_year"})[(o.item_type||"goal").toLowerCase()]||"goal";
      return db.addCoachingItem(tid,t,o.body,coach.id); }
  }
}

const TOUR_STEPS=[
  {sel:null, title:"Welcome to HES Coaching", body:"A 60-second tour of how the pieces fit together. You can skip anytime."},
  {sel:"#nav", title:"Everything lives here", body:"The sidebar is your map. What you see depends on your role — coaches, principals, and admins each get their own tools."},
  {route:"dashboard", sel:".kpi", title:"Your dashboard", body:"Hours this pay period, estimated pay, and contracted-hours progress — all at a glance."},
  {route:"timelog", sel:"#add", title:"Log your time", body:"Add time by school, activity, and teacher. Hours are computed for you. This replaces the spreadsheet."},
  {route:"verify", sel:"#ctl,.card", title:"Certify & payroll", body:"Review a pay period and certify it with one click. That replaces the “please verify these hours” email."},
  {route:"teachers", sel:"table", title:"Your caseload", body:"Open any teacher to see their growth timeline — every observation, goal, and resource in one place."},
  {route:"observe", sel:".card", title:"Digital observations", body:"A walkthrough form that replaces the Word checklist. Saving it feeds the teacher's timeline and the year-end report."},
  {route:"eoy", sel:"#report,.card", title:"The report writes itself", body:"Goals, resources, outcomes, and next-year focus compile into the end-of-year report automatically — no re-typing."},
  {route:"help", sel:".help,.card", title:"Help is always here", body:"Full how-to by role lives on this page. You can relaunch this tour anytime. That's it — you're ready."},
];
let tourIx=0, tourOn=false;
function ensureTourDom(){
  if(document.getElementById('tourOverlay')) return;
  document.body.appendChild(h(`<div id="tourOverlay"><div id="tourHole"></div></div>`));
  document.body.appendChild(h(`<div id="tourTip" style="display:none"></div>`));
}
async function startTour(){ tourOn=true; tourIx=0; ensureTourDom(); await showTourStep(); }
function endTour(){ tourOn=false; const o=document.getElementById('tourOverlay'),t=document.getElementById('tourTip');
  if(o)o.style.display='none'; if(t)t.style.display='none'; }
async function tourGo(delta){ tourIx+=delta; if(tourIx<0)tourIx=0;
  if(tourIx>=TOUR_STEPS.length){ endTour(); return; } await showTourStep(); }
async function showTourStep(){
  const step=TOUR_STEPS[tourIx];
  document.getElementById('tourOverlay').style.display='block';
  if(step.route && step.route!==state.route){ state.route=step.route; state.param=null; location.hash=step.route; await render(); await new Promise(r=>setTimeout(r,60)); }
  const hole=document.getElementById('tourHole'); const tip=document.getElementById('tourTip');
  let target=step.sel?document.querySelector(step.sel):null;
  const pad=8;
  if(target && target.getBoundingClientRect){
    const r=target.getBoundingClientRect();
    hole.style.display='block';
    hole.style.top=(r.top-pad)+'px'; hole.style.left=(r.left-pad)+'px';
    hole.style.width=(r.width+pad*2)+'px'; hole.style.height=(r.height+pad*2)+'px';
    // place tooltip below target if room, else above; clamp horizontally
    const below = r.bottom+16+180 < window.innerHeight;
    tip.style.display='block';
    tip.style.top = (below ? r.bottom+14 : Math.max(12, r.top-14-tip.offsetHeight)) + 'px';
    let left=Math.min(Math.max(12, r.left), window.innerWidth-312);
    tip.style.left=left+'px';
  } else {
    // centered (welcome / no target)
    hole.style.display='none';
    hole.style.top='50%';hole.style.left='50%';hole.style.width='0';hole.style.height='0';
    tip.style.display='block'; tip.style.top='50%'; tip.style.left='50%'; tip.style.transform='translate(-50%,-50%)';
  }
  if(target) tip.style.transform='';
  const last=tourIx===TOUR_STEPS.length-1;
  tip.innerHTML=`<div class="tstep">Step ${tourIx+1} of ${TOUR_STEPS.length}</div>
    <h4>${esc(step.title)}</h4><p>${esc(step.body)}</p>
    <div class="trow"><div class="tdots">${TOUR_STEPS.map((_,i)=>`<i class="${i===tourIx?'on':''}"></i>`).join("")}</div>
    ${tourIx>0?`<button class="btn sm" data-t="prev">Back</button>`:`<button class="btn sm" data-t="skip">Skip</button>`}
    <button class="btn p sm" data-t="next">${last?"Done":"Next"}</button></div>`;
  tip.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{const a=b.dataset.t;
    if(a==='next')tourGo(1); else if(a==='prev')tourGo(-1); else endTour();});
  // reposition after content sizes
  if(target){ requestAnimationFrame(()=>{ const r=target.getBoundingClientRect();
    const below=r.bottom+16+tip.offsetHeight<window.innerHeight;
    tip.style.top=(below?r.bottom+14:Math.max(12,r.top-14-tip.offsetHeight))+'px'; }); }
}

async function callTeam(action,payload){
  const ep=window.HCP_CONFIG.TEAM_ENDPOINT;
  if(!LIVE || !ep) return {demo:true};
  const {data:{session}}=await SB.auth.getSession();
  const r=await fetch(ep,{method:"POST",headers:{"Content-Type":"application/json",
    "Authorization":"Bearer "+(session?session.access_token:"")},
    body:JSON.stringify({action,...payload})});
  const j=await r.json(); if(!r.ok) throw new Error(j.error||"Request failed"); return j;
}
async function vTeam(v){
  v.appendChild(h(`<div class="banner noprint" style="margin-bottom:14px"><span>⊕</span>
    <div><b>Invite your coaches.</b> ${LIVE?"They'll get an email to set a password and land in the app with the access you choose here.":"Demo mode simulates invites in this session — connect Supabase + the invite function to send real emails."}</div></div>`));

  // invite form
  const roleOpts=["coach","principal","payroll","district_admin"].map(r=>`<option value="${r}">${r.replace("_"," ")}</option>`).join("");
  const schoolChecks=mem.schools.map(s=>`<label style="display:flex;gap:7px;align-items:center;font-size:13px;margin:3px 0"><input type="checkbox" data-school="${s.id}" style="width:auto">${esc(s.name)}</label>`).join("");
  const form=h(`<div class="card pad" style="margin-bottom:14px">
    <div class="eyebrow">Invite a team member</div>
    <div class="grid g2" style="margin-top:12px">
      <div class="field"><label class="f">Full name</label><input id="i_name" placeholder="Jane Doe"></div>
      <div class="field"><label class="f">Email</label><input id="i_email" type="email" placeholder="jane@school.org"></div>
      <div class="field"><label class="f">Role</label><select id="i_role">${roleOpts}</select></div>
      <div class="field"><label class="f">Hourly rate (coaches)</label><input id="i_rate" type="number" value="40"></div>
    </div>
    <div class="field" id="schoolWrap"><label class="f">Assign schools &amp; contracted hours (coaches)</label>
      <div style="display:grid;grid-template-columns:1fr 140px;gap:8px;align-items:center">
        <div>${schoolChecks}</div>
        <input id="i_hours" type="number" placeholder="Hours e.g. 700" title="Applied to each checked school">
      </div></div>
    <div id="i_msg" style="margin:6px 0"></div>
    <button class="btn p" id="invite">Send invite</button>
  </div>`);
  v.appendChild(form);
  form.querySelector('#invite').onclick=async()=>{
    const msg=form.querySelector('#i_msg');
    const name=form.querySelector('#i_name').value.trim(), email=form.querySelector('#i_email').value.trim();
    const role=form.querySelector('#i_role').value, rate=+form.querySelector('#i_rate').value||40;
    const hours=+form.querySelector('#i_hours').value||0;
    const schools=[...form.querySelectorAll('[data-school]:checked')].map(c=>c.dataset.school);
    if(!name||!email){ msg.innerHTML=`<span class="tag bad">Name and email are required</span>`; return; }
    const btn=form.querySelector('#invite'); btn.disabled=true; btn.textContent="Sending…";
    try{
      const res=await callTeam('invite',{name,email,role,rate,contracts:schools.map(s=>({school_id:s,hours,rate}))});
      if(res.demo){ // simulate in demo
        mem.coaches.push({id:"c"+Date.now(),name,short:initials(name),years:null,schools:schools.length?schools:mem.schools.map(s=>s.id)});
        msg.innerHTML=`<span class="tag good">Invite simulated (demo)</span> — ${esc(name)} would receive an email.`;
      } else {
        msg.innerHTML=`<span class="tag good">Invite sent to ${esc(email)}</span>`;
      }
      form.querySelector('#i_name').value="";form.querySelector('#i_email').value="";
      loadTeam();
    }catch(e){ msg.innerHTML=`<span class="tag bad">${esc(e.message)}</span>`; }
    btn.disabled=false; btn.textContent="Send invite";
  };

  // team list
  const list=h(`<div class="card"><div class="pad" style="padding-bottom:6px"><div class="eyebrow">Team members</div></div>
    <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead><tbody id="tbody"></tbody></table></div>`);
  v.appendChild(list);
  async function loadTeam(){
    const tb=list.querySelector('#tbody'); tb.innerHTML=`<tr><td colspan="4"><div class="empty">Loading…</div></td></tr>`;
    let members=[];
    try{ const res=await callTeam('list',{});
      if(res.demo){ members=mem.coaches.map(c=>({full_name:c.name,email:"—",role:"coach",status:"active"})); }
      else { members=res.members||[]; }
    }catch(e){ members=[]; }
    tb.innerHTML="";
    if(!members.length){ tb.appendChild(h(`<tr><td colspan="4"><div class="empty">No members yet.</div></td></tr>`)); return; }
    members.forEach(m=>{const active=(m.status==="active"||m.confirmed);
      tb.appendChild(h(`<tr><td><b>${esc(m.full_name||"—")}</b></td><td class="dim">${esc(m.email||"—")}</td>
        <td><span class="tag">${esc((m.role||"coach").replace("_"," "))}</span></td>
        <td><span class="status-dot" style="background:${active?'var(--good)':'var(--warn)'}"></span>${active?"Active":"Invited"}</td></tr>`));});
  }
  loadTeam();
}

function mountControls(){
  const rs=document.getElementById('roleSel');
  const cs=document.getElementById('coachSel');
  if(LIVE){
    // live: no demo switchers; show the signed-in role (read-only) + sign out
    rs.style.display='none'; cs.style.display='none';
    if(!document.getElementById('signout')){
      const b=h(`<button class="btn sm" id="signout">Sign out</button>`); b.onclick=()=>auth.signOut();
      document.querySelector('.who').insertBefore(b,document.getElementById('avatar'));
      const badge=h(`<span class="tag brand" id="rolebadge">${esc(state.role)}</span>`);
      document.querySelector('.who').insertBefore(badge,b);
    }
    return;
  }
  rs.innerHTML=ROLES.map(r=>`<option ${r===state.role?'selected':''}>${r}</option>`).join("");
  rs.onchange=e=>{state.role=e.target.value; render();};
  cs.innerHTML=mem.coaches.filter(c=>c.id!=="metima").map(c=>`<option value="${c.id}" ${c.id===state.coach?'selected':''}>${esc(c.name)}</option>`).join("");
  cs.onchange=e=>{state.coach=e.target.value; render();};
}
(async function(){
  await initBackend();
  mountControls();
  const tb=document.getElementById('tourBtn'); if(tb) tb.onclick=()=>startTour();
  const[r,p]=location.hash.replace(/^#/,"").split("/");
  if(r){state.route=r;state.param=p||null;}
  await render();
  // auto-offer the tour once per session (skips when already signed in to a busy account)
  if(!window.__hcpToured && !(auth.configured() && !state.user)){
    window.__hcpToured=true;
    setTimeout(()=>startTour(), 500);
  }
})();
</script>
